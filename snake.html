<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>貪食蛇</title>
<style>
  :root {
    color-scheme: dark;
  }
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body {
    overscroll-behavior: none;
  }
  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px;
    background: #111827;
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    color: #e5e7eb;
    touch-action: none;
    user-select: none;
  }
  h1 {
    margin: 0;
    font-size: 24px;
  }
  #score {
    font-size: 18px;
  }
  #game-area {
    display: grid;
    grid-template-columns: 52px clamp(160px, calc(100vw - 190px), 380px) 52px;
    grid-template-rows: 52px clamp(160px, calc(100vw - 190px), 380px) 52px;
    gap: 8px;
    align-items: center;
    justify-items: center;
  }
  canvas {
    grid-column: 2;
    grid-row: 2;
    width: 100%;
    height: 100%;
    aspect-ratio: 1 / 1;
    background: #1f2937;
    border: 2px solid #4b5563;
    border-radius: 8px;
    image-rendering: pixelated;
    touch-action: none;
    cursor: pointer;
  }
  #hint {
    font-size: 13px;
    color: #9ca3af;
    text-align: center;
  }
  #hint .mobile-only {
    display: none;
  }
  #game-area button {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    border: 2px solid #16a34a;
    color: #052e16;
    font-size: 24px;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(34, 197, 94, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    cursor: pointer;
  }
  #game-area button:hover {
    background: #4ade80;
  }
  #game-area button:active {
    background: #16a34a;
  }
  #btn-up { grid-column: 2; grid-row: 1; }
  #btn-left { grid-column: 1; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }
  #btn-down { grid-column: 2; grid-row: 3; }

  #btn-pause {
    border: none;
    border-radius: 8px;
    background: #f59e0b;
    border: 2px solid #d97706;
    color: #451a03;
    font-size: 14px;
    font-weight: bold;
    padding: 6px 18px;
    box-shadow: 0 2px 6px rgba(245, 158, 11, 0.4);
    cursor: pointer;
  }
  #btn-pause:hover {
    background: #fbbf24;
  }
  #btn-pause:active {
    background: #d97706;
  }

  @media (hover: none) and (pointer: coarse) {
    #hint .desktop-only { display: none; }
    #hint .mobile-only { display: inline; }
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
  }
  #overlay.show {
    display: flex;
  }
  #overlay button {
    padding: 8px 20px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    background: #22c55e;
    color: #052e16;
    cursor: pointer;
    font-weight: bold;
  }
  #overlay button:hover {
    background: #4ade80;
  }
</style>
</head>
<body>
  <h1>🐍 貪食蛇</h1>
  <div id="score">分數：0　最高分：0</div>

  <div id="game-area">
    <button id="btn-up" aria-label="上">▲</button>
    <button id="btn-left" aria-label="左">◀</button>
    <canvas id="game" width="400" height="400"></canvas>
    <button id="btn-right" aria-label="右">▶</button>
    <button id="btn-down" aria-label="下">▼</button>
  </div>

  <button id="btn-pause" aria-label="暫停">⏸ 暫停</button>

  <div id="hint">
    <span class="desktop-only">方向鍵 / WASD 移動　｜　空白鍵 暫停　｜　也可點擊畫面或按鈕轉向</span>
    <span class="mobile-only">點擊畫面、滑動、或按四周的按鈕轉向</span>
  </div>

  <div id="overlay">
    <div id="overlayText" style="font-size:22px;">遊戲結束</div>
    <button id="restartBtn">重新開始</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  const restartBtn = document.getElementById('restartBtn');
  const btnUp = document.getElementById('btn-up');
  const btnDown = document.getElementById('btn-down');
  const btnLeft = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');
  const btnPause = document.getElementById('btn-pause');

  const GRID = 20;
  const COLS = canvas.width / GRID;
  const ROWS = canvas.height / GRID;
  const TICK_MS = 210;

  // 果實種類：普通 / 變色 / 加長
  const FOOD_TYPES = [
    { type: 'normal', weight: 20, color: '#ef4444', radius: GRID / 2 - 2 },
    { type: 'color', weight: 50, color: '#a855f7', radius: GRID / 2 - 2 },
    { type: 'grow', weight: 30, color: '#f59e0b', radius: GRID / 2 - 1 }
  ];
  const SNAKE_COLORS = [
    { head: '#4ade80', body: '#22c55e' },
    { head: '#60a5fa', body: '#3b82f6' },
    { head: '#fbbf24', body: '#f59e0b' },
    { head: '#f472b6', body: '#ec4899' },
    { head: '#a78bfa', body: '#8b5cf6' },
    { head: '#22d3ee', body: '#06b6d4' }
  ];

  let snake, dir, nextDir, food, score, best, running, paused, timer;
  let colorIdx, growthPending;

  best = Number(localStorage.getItem('snake_best') || 0);

  function pickFoodType() {
    const total = FOOD_TYPES.reduce((sum, f) => sum + f.weight, 0);
    let r = Math.random() * total;
    for (const f of FOOD_TYPES) {
      if (r < f.weight) return f;
      r -= f.weight;
    }
    return FOOD_TYPES[0];
  }

  function randomFood() {
    while (true) {
      const pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
      if (!snake.some(s => s.x === pos.x && s.y === pos.y)) {
        return { ...pos, ...pickFoodType() };
      }
    }
  }

  function init() {
    snake = [
      { x: 8, y: 10 },
      { x: 7, y: 10 },
      { x: 6, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    paused = false;
    running = true;
    colorIdx = 0;
    growthPending = 0;
    food = randomFood();
    overlay.classList.remove('show');
    updateScore();
    if (timer) clearInterval(timer);
    timer = setInterval(tick, TICK_MS);
    draw();
  }

  function updateScore() {
    scoreEl.textContent = `分數：${score}　最高分：${best}`;
  }

  function tick() {
    if (!running || paused) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 撞牆
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    // 撞自己
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      if (food.type === 'color') {
        colorIdx = (colorIdx + 1 + Math.floor(Math.random() * (SNAKE_COLORS.length - 1))) % SNAKE_COLORS.length;
      } else if (food.type === 'grow') {
        score++;
        growthPending += 3;
      }
      if (score > best) {
        best = score;
        localStorage.setItem('snake_best', best);
      }
      updateScore();
      food = randomFood();
    } else if (growthPending > 0) {
      growthPending--;
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver() {
    running = false;
    clearInterval(timer);
    overlayText.textContent = `遊戲結束！分數：${score}`;
    overlay.classList.add('show');
  }

  function draw() {
    ctx.fillStyle = '#1f2937';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 食物
    ctx.fillStyle = food.color;
    ctx.beginPath();
    ctx.arc(
      food.x * GRID + GRID / 2,
      food.y * GRID + GRID / 2,
      food.radius, 0, Math.PI * 2
    );
    ctx.fill();
    if (food.type !== 'normal') {
      ctx.strokeStyle = '#f9fafb';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // 蛇
    const palette = SNAKE_COLORS[colorIdx];
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? palette.head : palette.body;
      ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
    });
  }

  function setDir(x, y) {
    // 不能反向走
    if (dir.x === -x && dir.y === -y) return;
    nextDir = { x, y };
  }

  function togglePause() {
    if (running) paused = !paused;
  }

  window.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': setDir(0, -1); break;
      case 'ArrowDown': case 's': case 'S': setDir(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': setDir(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': setDir(1, 0); break;
      case ' ':
        togglePause();
        break;
    }
  });

  restartBtn.addEventListener('click', init);

  // 螢幕方向鍵（手機）
  function bindTap(el, handler) {
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      handler();
    }, { passive: false });
    el.addEventListener('click', handler);
  }
  bindTap(btnUp, () => setDir(0, -1));
  bindTap(btnDown, () => setDir(0, 1));
  bindTap(btnLeft, () => setDir(-1, 0));
  bindTap(btnRight, () => setDir(1, 0));
  bindTap(btnPause, togglePause);

  // 點擊畫面上下左右轉向：以畫面中心為基準，點在哪一側就往哪個方向走
  function setDirFromPoint(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left - rect.width / 2;
    const y = clientY - rect.top - rect.height / 2;
    if (Math.abs(x) > Math.abs(y)) {
      setDir(x > 0 ? 1 : -1, 0);
    } else {
      setDir(0, y > 0 ? 1 : -1);
    }
  }

  // 手指滑動 / 點擊操作
  let touchStartX = 0, touchStartY = 0;
  const SWIPE_THRESHOLD = 24;

  canvas.addEventListener('touchstart', (e) => {
    const t = e.changedTouches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) {
      // 移動距離很小，視為點擊：依點擊位置判斷方向
      setDirFromPoint(t.clientX, t.clientY);
    } else if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
  }, { passive: false });

  // 滑鼠點擊（桌面）
  canvas.addEventListener('click', (e) => {
    setDirFromPoint(e.clientX, e.clientY);
  });

  init();
})();
</script>
</body>
</html>
