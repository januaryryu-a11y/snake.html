<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>貪食蛇</title>
<style>
  :root {
    color-scheme: dark;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #111827;
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    color: #e5e7eb;
  }
  h1 {
    margin: 0;
    font-size: 24px;
  }
  #score {
    font-size: 18px;
  }
  canvas {
    background: #1f2937;
    border: 2px solid #4b5563;
    border-radius: 8px;
    image-rendering: pixelated;
  }
  #hint {
    font-size: 13px;
    color: #9ca3af;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
  }
  #overlay.show {
    display: flex;
  }
  #overlay button {
    padding: 8px 20px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    background: #22c55e;
    color: #052e16;
    cursor: pointer;
    font-weight: bold;
  }
  #overlay button:hover {
    background: #4ade80;
  }
</style>
</head>
<body>
  <h1>🐍 貪食蛇</h1>
  <div id="score">分數：0　最高分：0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="hint">方向鍵 / WASD 移動　｜　空白鍵 暫停</div>

  <div id="overlay">
    <div id="overlayText" style="font-size:22px;">遊戲結束</div>
    <button id="restartBtn">重新開始</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  const restartBtn = document.getElementById('restartBtn');

  const GRID = 20;
  const COLS = canvas.width / GRID;
  const ROWS = canvas.height / GRID;
  const TICK_MS = 110;

  let snake, dir, nextDir, food, score, best, running, paused, timer;

  best = Number(localStorage.getItem('snake_best') || 0);

  function randomFood() {
    while (true) {
      const pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
      if (!snake.some(s => s.x === pos.x && s.y === pos.y)) return pos;
    }
  }

  function init() {
    snake = [
      { x: 8, y: 10 },
      { x: 7, y: 10 },
      { x: 6, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    paused = false;
    running = true;
    food = randomFood();
    overlay.classList.remove('show');
    updateScore();
    if (timer) clearInterval(timer);
    timer = setInterval(tick, TICK_MS);
    draw();
  }

  function updateScore() {
    scoreEl.textContent = `分數：${score}　最高分：${best}`;
  }

  function tick() {
    if (!running || paused) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 撞牆
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    // 撞自己
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      if (score > best) {
        best = score;
        localStorage.setItem('snake_best', best);
      }
      updateScore();
      food = randomFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver() {
    running = false;
    clearInterval(timer);
    overlayText.textContent = `遊戲結束！分數：${score}`;
    overlay.classList.add('show');
  }

  function draw() {
    ctx.fillStyle = '#1f2937';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 食物
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(
      food.x * GRID + GRID / 2,
      food.y * GRID + GRID / 2,
      GRID / 2 - 2, 0, Math.PI * 2
    );
    ctx.fill();

    // 蛇
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
      ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
    });
  }

  function setDir(x, y) {
    // 不能反向走
    if (dir.x === -x && dir.y === -y) return;
    nextDir = { x, y };
  }

  window.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': setDir(0, -1); break;
      case 'ArrowDown': case 's': case 'S': setDir(0, 1); break;
      case 'ArrowLeft': case 'a': case 'A': setDir(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': setDir(1, 0); break;
      case ' ':
        if (running) paused = !paused;
        break;
    }
  });

  restartBtn.addEventListener('click', init);

  init();
})();
</script>
</body>
</html>
